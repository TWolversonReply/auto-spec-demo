name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs and dependencies
        run: pip install mkdocs-material

      - uses: actions/setup-java@v4
        if: hashFiles('model/*.cml') != ''
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Generate context map from CML
        if: hashFiles('model/*.cml') != ''
        run: |
          # Install Graphviz (required by Context Mapper for context map images)
          sudo apt-get update -qq && sudo apt-get install -y -qq graphviz > /dev/null

          # Download Context Mapper CLI
          curl -sL https://repo1.maven.org/maven2/org/contextmapper/context-mapper-cli/6.12.0/context-mapper-cli-6.12.0.tar -o cm.tar
          tar xf cm.tar

          # Generate context map image (PNG) and PlantUML from CML
          mkdir -p _build/docs/images
          ./context-mapper-cli-6.12.0/bin/cm generate -i model/context-map.cml -g context-map -o _build/docs/images/
          ./context-mapper-cli-6.12.0/bin/cm generate -i model/context-map.cml -g plantuml -o _build/docs/images/

      - name: Assemble docs from repo sources
        run: |
          mkdir -p _build/docs

          # Copy index
          cp index.md _build/docs/index.md

          # Copy static assets (stylesheets, images)
          cp -r docs_assets/* _build/docs/

          # Copy constitution under home/constitution/
          mkdir -p _build/docs/constitution
          cp .specify/memory/constitution.md _build/docs/constitution/index.md

          # Copy CML model source (for linking from docs)
          if [ -d model ]; then
            cp -r model _build/docs/model
          fi

          # Copy specs (feature documentation produced by spec-kit workflow)
          if [ -d specs ]; then
            cp -r specs _build/docs/specs
          fi

      - name: Build MkDocs site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
