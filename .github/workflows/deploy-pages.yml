name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs and dependencies
        run: pip install mkdocs-material

      - name: Assemble docs from repo sources
        run: |
          mkdir -p _build/docs

          # Copy index
          cp index.md _build/docs/index.md

          # Copy constitution under home/constitution/
          mkdir -p _build/docs/constitution
          cp .specify/memory/constitution.md _build/docs/constitution/index.md

          # Copy specs (feature documentation produced by spec-kit workflow)
          if [ -d specs ]; then
            cp -r specs _build/docs/specs
          fi

      - name: Build MkDocs site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
