site_name: auto-spec-demo
site_url: https://twolversonreply.github.io/auto-spec-demo/
repo_url: https://github.com/TWolversonReply/auto-spec-demo

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: default
    primary: indigo

docs_dir: _build/docs

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences

plugins:
  - search
